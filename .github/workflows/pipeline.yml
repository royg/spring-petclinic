name: Secure CI Pipeline - Spring PetClinic 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JFROG_URL: https://royg.jfrog.io
  DOCKER_IMAGE: royg.jfrog.io/petclinic-docker-local/spring-petclinic
  JFROG_CLI_BUILD_NAME: spring-petclinic-pipeline
  JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_ACCESS_TOKEN }}
          JF_USER: ${{ secrets.JFROG_USERNAME }}  

      - name: Configure Maven to use JFrog Artifactory
        run: jf mvn-config --server-id-resolve=setup-jfrog-cli-server --repo-resolve-releases=petclinic-maven-virtual --repo-resolve-snapshots=petclinic-maven-virtual --server-id-deploy=setup-jfrog-cli-server --repo-deploy-releases=petclinic-maven-dev-local --repo-deploy-snapshots=petclinic-maven-dev-local
    
      - name: Compile the application
        run: jf mvn clean compile -DskipTests

      - name: Run tests
        run: jf mvn test

      - name: Package application
        run: jf mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to JFrog Container Registry
        run: |
          echo ${{ secrets.JFROG_ACCESS_TOKEN }} | docker login royg.jfrog.io \
            --username ${{ secrets.JFROG_USERNAME }} \
            --password-stdin

      - name: Build Docker image
        run:  docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Push Docker image to Artifactory
        run: docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Scan Docker image with Xray
        run: jf docker scan ${{ env.DOCKER_IMAGE }}:${{ github.sha }} --format json > royg-jfrog-xray-scan-results.json
          cat royg-jfrog-xray-scan-results.json

      - name: Upload Xray scan results as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: royg-jfrog-xray-scan-results
          path: royg-jfrog-xray-scan-results.json

      - name: Publish build info to Artifactory
        run: jf rt build-publish ${{ env.JFROG_CLI_BUILD_NAME }} ${{ env.JFROG_CLI_BUILD_NUMBER }}

